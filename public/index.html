<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra Ágil · Andes Medikeep</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --navy: #1E3A6E; --navy-h: #16305c;
      --teal: #2BBFAA; --teal-h: #22a898; --teal-bg: rgba(43,191,170,0.10);
      --amber: #f59e0b; --amber-h: #d98a06;
      --bg: #f4f6fb; --card: #fff; --side: #eef1f8;
      --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.15);
      --text: #1a1a2e; --muted: #6b7280; --light: #9ca3af;
      --r: 10px; --rs: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    .hdr { background: var(--navy); height: 54px; display: flex; align-items: center; gap: 12px; padding: 0 22px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
    .hdr-logo { width: 30px; height: 30px; background: var(--teal); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hdr h1 { color: #fff; font-size: 15px; font-weight: 600; }
    .hdr h1 span { color: var(--teal); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .badge-ok  { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: rgba(43,191,170,0.22); color: var(--teal); }
    .badge-nok { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); }
    .btn-hdr { height: 32px; padding: 0 14px; border-radius: var(--rs); border: none; background: var(--teal); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-hdr:hover { background: var(--teal-h); }
    .layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 54px); }
    .side { background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .side-top { padding: 14px 14px 0; flex-shrink: 0; }
    .side-scroll { flex: 1; overflow-y: auto; padding: 0 14px 14px; }
    .side-bot { padding: 10px 14px 14px; border-top: 1px solid var(--border); background: var(--side); flex-shrink: 0; }
    .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; margin-bottom: 7px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .new-cat { display: flex; gap: 6px; margin-bottom: 10px; }
    .new-cat input { flex: 1; height: 34px; border-radius: var(--rs); border: 1px solid var(--border-md); padding: 0 10px; font-size: 13px; background: var(--card); color: var(--text); min-width: 0; }
    .new-cat input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(43,191,170,.12); }
    .btn-add-cat { height: 34px; width: 34px; border-radius: var(--rs); border: none; background: var(--navy); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add-cat:hover { background: var(--navy-h); }
    .cat-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .cat-item { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border-radius: var(--rs); border: 1px solid transparent; background: var(--card); font-size: 13px; cursor: pointer; box-shadow: var(--shadow); transition: border-color .12s; }
    .cat-item:hover { border-color: var(--teal); }
    .cat-item.all { border-color: rgba(43,191,170,.35); }
    .cat-item.all.active { background: var(--teal); border-color: var(--teal); color: #fff; }
    .cat-item.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    .cat-item.opp { border-color: rgba(245,158,11,.35); }
    .cat-item.opp.active { background: var(--amber); border-color: var(--amber); color: #fff; }
    .cat-item span.name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-item .cnt { font-size: 10px; padding: 1px 6px; border-radius: 20px; background: rgba(0,0,0,.08); flex-shrink: 0; font-weight: 500; }
    .cat-item.active .cnt, .cat-item.all.active .cnt, .cat-item.opp.active .cnt { background: rgba(255,255,255,.25); color: #fff; }
    .cat-item .del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 0; opacity: 0; flex-shrink: 0; }
    .cat-item:hover .del { opacity: 1; }
    .cat-item.active .del { color: rgba(255,255,255,.5); opacity: 1; }
    .cat-item .del:hover { color: #ef4444 !important; }
    .sub-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--rs); padding: 9px; margin-bottom: 8px; box-shadow: var(--shadow); }
    .sub-hdr { font-size: 11px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .sub-hdr strong { color: var(--text); font-weight: 600; }
    .sub-words { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .sub-word { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: var(--rs); border: 1px solid var(--border); font-size: 12px; background: var(--side); }
    .sub-word span { flex: 1; }
    .sub-word .del-sw { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 0; opacity: 0; }
    .sub-word:hover .del-sw { opacity: 1; }
    .sub-word .del-sw:hover { color: #ef4444; }
    .btn-precios { width: 100%; height: 32px; border-radius: var(--rs); border: 1px dashed var(--border-md); background: var(--card); color: var(--navy); font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; }
    .btn-precios:hover { background: var(--side); border-style: solid; }
    .btn-precios:disabled { opacity: .55; cursor: not-allowed; }
    .sub-add { display: flex; gap: 5px; }
    .sub-add input { flex: 1; height: 30px; border-radius: var(--rs); border: 1px solid var(--border-md); padding: 0 9px; font-size: 12px; background: var(--side); color: var(--text); min-width: 0; }
    .sub-add input:focus { outline: none; border-color: var(--teal); }
    .btn-add-sw { height: 30px; width: 30px; border-radius: var(--rs); border: none; background: var(--teal); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add-sw:hover { background: var(--teal-h); }
    .api-row { display: flex; gap: 5px; }
    .api-row input { flex: 1; height: 30px; border-radius: var(--rs); border: 1px solid var(--border-md); padding: 0 9px; font-size: 11px; background: var(--card); color: var(--text); min-width: 0; }
    .api-row input:focus { outline: none; border-color: var(--teal); }
    .btn-ok { height: 30px; padding: 0 11px; border-radius: var(--rs); border: 1px solid var(--border-md); background: var(--card); color: var(--text); font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-ok:hover { background: var(--side); }
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { padding: 12px 18px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
    .top-bar select { height: 34px; border-radius: var(--rs); border: 1px solid var(--border-md); padding: 0 10px; font-size: 13px; background: var(--card); color: var(--text); cursor: pointer; }
    .btn-buscar { height: 34px; padding: 0 16px; border-radius: var(--rs); border: none; background: var(--navy); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; margin-left: auto; }
    .btn-buscar:hover { background: var(--navy-h); }
    .btn-buscar-lic { height: 34px; padding: 0 14px; border-radius: var(--rs); border: 1px solid var(--border-md); background: var(--card); color: var(--navy); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; }
    .btn-buscar-lic:hover { background: var(--side); }
    .btn-buscar-lic:disabled { opacity: .55; cursor: not-allowed; }
    .fuente-toggle { display: flex; border: 1px solid var(--border-md); border-radius: var(--rs); overflow: hidden; }
    .ftg-btn { height: 34px; padding: 0 12px; border: none; background: var(--card); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; }
    .ftg-btn + .ftg-btn { border-left: 1px solid var(--border-md); }
    .ftg-btn.active { background: var(--navy); color: #fff; }
    .chip-src { background: #475569; color: #fff; }
    .scope-bar { padding: 8px 18px; font-size: 12px; color: var(--muted); background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; flex-shrink: 0; }
    .chip { display: inline-flex; align-items: center; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .chip-all { background: var(--teal); color: #fff; }
    .chip-cat { background: var(--navy); color: #fff; }
    .chip-opp { background: var(--amber); color: #fff; }
    .scroll { flex: 1; overflow-y: auto; padding: 16px 18px; }
    .results-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .results-count { font-size: 12px; color: var(--muted); }
    .sort-lbl { font-size: 11px; color: var(--light); margin-left: auto; }
    .card { border: 1px solid var(--border); border-radius: var(--r); padding: 13px 15px; margin-bottom: 8px; background: var(--card); box-shadow: var(--shadow); transition: border-color .12s, box-shadow .12s; }
    .card:hover { border-color: var(--teal); box-shadow: var(--shadow-md); }
    .card.is-opp { border-color: rgba(245,158,11,.45); }
    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .card-title { font-size: 13px; font-weight: 700; flex: 1; line-height: 1.45; }
    .card-title.visto { font-weight: 500; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .badge-pub  { background: #dcfce7; color: #166534; }
    .badge-cerr { background: #f1f5f9; color: #475569; }
    .badge-des  { background: #fef9c3; color: #854d0e; }
    .badge-canc { background: #fee2e2; color: #991b1b; }
    .badge-sel  { background: #eff6ff; color: #1d4ed8; }
    .badge-nuevo { background: var(--teal); color: #fff; }
    .badge-leido { background: #f1f5f9; color: #94a3b8; }
    .card-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field .flbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
    .field .fval { font-size: 12px; font-weight: 500; }
    .fval.monto { color: var(--navy); font-size: 13px; font-weight: 600; }
    .fval.urgente { color: #dc2626; }
    .fval.pronto  { color: #d97706; }
    .card-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 9px; border-top: 1px solid var(--border); gap: 8px; }
    .pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill-cat { font-size: 11px; background: rgba(30,58,110,.08); color: var(--navy); border-radius: 20px; padding: 2px 9px; font-weight: 500; }
    .pill-kw  { font-size: 11px; background: var(--teal-bg); color: #065f52; border-radius: 20px; padding: 2px 9px; }
    .pill-cod { font-size: 11px; background: #f1f5f9; color: #475569; border-radius: 20px; padding: 2px 9px; font-family: monospace; }
    .card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-star { background: none; border: 1px solid var(--border-md); border-radius: 20px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); flex-shrink: 0; font-size: 15px; }
    .btn-star:hover { border-color: var(--amber); color: var(--amber); }
    .btn-star.active { background: var(--amber); border-color: var(--amber); color: #fff; }
    .btn-star.active:hover { background: var(--amber-h); border-color: var(--amber-h); color: #fff; }
    .btn-cotiz { font-size: 11px; font-weight: 600; height: 30px; padding: 0 11px; border-radius: var(--rs); border: 1px solid var(--navy); background: var(--navy); color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
    .btn-cotiz:hover { background: var(--navy-h); }
    .btn-cotiz.emc { background: var(--teal); border-color: var(--teal); }
    .btn-cotiz.emc:hover { background: var(--teal-h); border-color: var(--teal-h); }
    .link-ver { font-size: 12px; color: var(--teal); text-decoration: none; display: inline-flex; align-items: center; gap: 3px; font-weight: 500; white-space: nowrap; }
    .link-ver:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .empty i { font-size: 36px; color: var(--teal); display: block; margin-bottom: 12px; }
    .spinner { text-align: center; padding: 50px; color: var(--muted); font-size: 13px; }
    .spinner i { font-size: 28px; display: block; margin-bottom: 10px; animation: spin .8s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .progress-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; text-align: center; font-size: 13px; color: var(--muted); }
    .prog-track { height: 5px; background: var(--border); border-radius: 3px; margin: 12px 0 6px; overflow: hidden; }
    .prog-fill  { height: 5px; background: var(--teal); border-radius: 3px; transition: width .3s; }
    .err-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--rs); padding: 10px 14px; font-size: 12px; color: #991b1b; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .side { max-height: 260px; border-right: none; border-bottom: 1px solid var(--border); }
      .card-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo"><i class="ti ti-building-hospital" style="color:#fff;font-size:17px;"></i></div>
  <h1>Compra Ágil · <span>Buscador</span></h1>
  <div class="hdr-right">
    <span id="api-badge" class="badge-nok">Cargando...</span>
    <button class="btn-hdr" onclick="buscarTodo()"><i class="ti ti-refresh"></i> Actualizar</button>
  </div>
</div>

<div class="layout">
  <div class="side">
    <div class="side-top">
      <div class="lbl">Oportunidades</div>
      <div class="cat-list" style="margin-bottom: 10px;">
        <div class="cat-item opp" id="opp-item" onclick="selOpp()">
          <i class="ti ti-star" style="font-size:15px;flex-shrink:0"></i>
          <span class="name">Guardadas</span>
          <span class="cnt" id="opp-cnt" style="display:none">0</span>
        </div>
      </div>
      <hr class="divider" />
      <div class="lbl">Categorías</div>
      <div class="new-cat">
        <input id="cat-inp" type="text" placeholder="Nueva categoría..." onkeydown="if(event.key==='Enter')addCat()" />
        <button class="btn-add-cat" onclick="addCat()" aria-label="Agregar">+</button>
      </div>
      <hr class="divider" />
    </div>
    <div class="side-scroll">
      <div class="cat-list" id="cat-list"></div>
      <div id="sub-area"></div>
    </div>
    <div class="side-bot">
      <div class="lbl">API key ChileCompra</div>
      <div class="api-row">
        <input type="password" id="api-inp" placeholder="Tu ticket" />
        <button class="btn-ok" onclick="saveKey()">OK</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="top-bar">
      <select id="estado-sel" onchange="renderVisible()">
        <option value="publicada">Publicadas</option>
        <option value="cerrada">Cerradas</option>
        <option value="proveedor_seleccionado">Proveedor seleccionado</option>
        <option value="">Todos los estados</option>
      </select>
      <select id="region-sel" onchange="buscarTodo()">
        <option value="">Todas las regiones</option>
        <option value="13">R.M. (Santiago)</option>
        <option value="5">Valparaíso</option>
        <option value="8">Biobío</option>
        <option value="9">Araucanía</option>
        <option value="7">Maule</option>
        <option value="6">O'Higgins</option>
        <option value="4">Coquimbo</option>
        <option value="10">Los Lagos</option>
        <option value="3">Atacama</option>
        <option value="2">Antofagasta</option>
        <option value="1">Tarapacá</option>
        <option value="11">Aysén</option>
        <option value="12">Magallanes</option>
        <option value="14">Los Ríos</option>
        <option value="15">Arica y Parinacota</option>
        <option value="16">Ñuble</option>
      </select>
      <div class="fuente-toggle" id="fuente-toggle">
        <button class="ftg-btn active" data-f="ca" onclick="setFuente('ca')">Compra Ágil</button>
        <button class="ftg-btn" data-f="lic" onclick="setFuente('lic')">Licitaciones</button>
      </div>
      <button class="btn-buscar" onclick="buscarTodo()"><i class="ti ti-search"></i> Buscar todo</button>
      <button class="btn-buscar-lic" id="btn-buscar-lic" onclick="buscarLicitaciones()"><i class="ti ti-gavel"></i> Buscar licitaciones</button>
    </div>
    <div class="scope-bar" id="scope-bar">
      <i class="ti ti-loader" style="font-size:14px;flex-shrink:0"></i>
      Iniciando búsqueda automática...
    </div>
    <div class="scroll">
      <div id="main-area" class="spinner"><i class="ti ti-refresh"></i>Buscando en todas las categorías...</div>
    </div>
  </div>
</div>

<script>
const KEY_KEY    = 'mp_ca_key_v1';
const BACKUP_KEY = 'mp_cats_backup';
const OPP_BACKUP_KEY = 'mp_opp_backup';
const VISTOS_BACKUP_KEY = 'mp_vistos_backup';
const DEF_KEY    = '38366B56-462A-4B4F-9FEE-18F946D9F1B5';

let cats          = [];
let oportunidades = [];
let vistos        = [];
let apiKey        = DEF_KEY;
let activeCat     = null; // null = todas | número = índice de categoría | 'opp' = oportunidades
let allResults    = [];
let allResultsLic = [];
let fuente        = 'ca'; // 'ca' = Compra Ágil | 'lic' = Licitaciones
let licBuscada    = false;

function currentResults() { return fuente === 'lic' ? allResultsLic : allResults; }

function setFuente(f) {
  fuente = f;
  document.querySelectorAll('.ftg-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  activeCat = null;
  renderAll(); updateScope(); renderVisible();
}

async function loadStorage() {
  try {
    const res  = await fetch('/api/categorias');
    const data = await res.json();
    if (data.cats && data.cats.length) {
      cats = data.cats;
      try { localStorage.setItem(BACKUP_KEY, JSON.stringify(cats)); } catch(e) {}
    } else {
      const backup = localStorage.getItem(BACKUP_KEY);
      if (backup) cats = JSON.parse(backup);
      else seedCats();
    }
  } catch(e) {
    const backup = localStorage.getItem(BACKUP_KEY);
    if (backup) cats = JSON.parse(backup);
    else seedCats();
  }
  await loadOportunidades();
  await loadVistos();
  try { const s = localStorage.getItem(KEY_KEY); if(s) apiKey = s; } catch(e) {}
  document.getElementById('api-inp').value = apiKey;
  updateBadge();
}

async function saveStorage() {
  try {
    await fetch('/api/categorias', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cats })
    });
    try { localStorage.setItem(BACKUP_KEY, JSON.stringify(cats)); } catch(e) {}
  } catch(e) {}
  try { localStorage.setItem(KEY_KEY, apiKey); } catch(e) {}
}

async function loadOportunidades() {
  try {
    const res  = await fetch('/api/oportunidades');
    const data = await res.json();
    if (data.items) {
      oportunidades = data.items;
      try { localStorage.setItem(OPP_BACKUP_KEY, JSON.stringify(oportunidades)); } catch(e) {}
    } else {
      const backup = localStorage.getItem(OPP_BACKUP_KEY);
      if (backup) oportunidades = JSON.parse(backup);
    }
  } catch(e) {
    const backup = localStorage.getItem(OPP_BACKUP_KEY);
    if (backup) oportunidades = JSON.parse(backup);
  }
}

async function saveOportunidades() {
  try {
    await fetch('/api/oportunidades', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: oportunidades })
    });
    try { localStorage.setItem(OPP_BACKUP_KEY, JSON.stringify(oportunidades)); } catch(e) {}
  } catch(e) {}
}

async function loadVistos() {
  try {
    const res  = await fetch('/api/vistos');
    const data = await res.json();
    if (data.codigos) {
      vistos = data.codigos;
      try { localStorage.setItem(VISTOS_BACKUP_KEY, JSON.stringify(vistos)); } catch(e) {}
    } else {
      const backup = localStorage.getItem(VISTOS_BACKUP_KEY);
      if (backup) vistos = JSON.parse(backup);
    }
  } catch(e) {
    const backup = localStorage.getItem(VISTOS_BACKUP_KEY);
    if (backup) vistos = JSON.parse(backup);
  }
}

async function saveVistos() {
  try {
    await fetch('/api/vistos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigos: vistos })
    });
    try { localStorage.setItem(VISTOS_BACKUP_KEY, JSON.stringify(vistos)); } catch(e) {}
  } catch(e) {}
}

function esVisto(codigo) { return vistos.includes(codigo); }

function marcarVisto(codigo) {
  if (vistos.includes(codigo)) return;
  vistos.push(codigo);
  saveVistos();
  renderVisible();
}

function isOpp(codigo) { return oportunidades.some(o => o.codigo === codigo); }

function toggleOpp(codigo, e) {
  if (e) e.stopPropagation();
  const idx = oportunidades.findIndex(o => o.codigo === codigo);
  if (idx >= 0) {
    oportunidades.splice(idx, 1);
  } else {
    const item = currentResults().find(r => r.codigo === codigo) || oportunidades.find(o => o.codigo === codigo);
    if (item) oportunidades.unshift({ ...item, _savedAt: new Date().toISOString() });
  }
  saveOportunidades();
  renderOppCount();
  renderVisible();
}

function saveKey() {
  apiKey = document.getElementById('api-inp').value.trim() || DEF_KEY;
  try { localStorage.setItem(KEY_KEY, apiKey); } catch(e) {}
  updateBadge();
}

function updateBadge() {
  const b = document.getElementById('api-badge');

}

function seedCats() {
  cats = [
    { name:'Catéter JJ',       words:['cateter jj','pigtail','doble j','ureteral stent'] },
    { name:'Guía hidrofílica',  words:['guia hidrofílica','guia nitinol','hydrophilic guidewire'] },

  ];
}

function addCat() {
  const inp = document.getElementById('cat-inp');
  const val = inp.value.trim();
  if (!val || cats.find(c => c.name.toLowerCase() === val.toLowerCase())) { inp.value = ''; return; }
  cats.push({ name: val, words: [] });
  inp.value = '';
  saveStorage(); renderCatList();
}

function delCat(idx, e) {
  e.stopPropagation();
  cats.splice(idx, 1);
  if (activeCat === idx) activeCat = null;
  else if (typeof activeCat === 'number' && activeCat > idx) activeCat--;
  saveStorage(); renderAll(); updateScope(); renderVisible();
}

function selCat(idx) {
  activeCat = (activeCat === idx) ? null : idx;
  renderAll(); updateScope(); renderVisible();
}

function selAll() { activeCat = null; renderAll(); updateScope(); renderVisible(); }

function selOpp() { activeCat = (activeCat === 'opp') ? null : 'opp'; renderAll(); updateScope(); renderVisible(); }

function addSub() {
  if (typeof activeCat !== 'number') return;
  const inp = document.getElementById('sub-inp');
  const val = inp.value.trim();
  if (!val || cats[activeCat].words.includes(val)) { inp.value = ''; return; }
  cats[activeCat].words.push(val);
  inp.value = '';
  saveStorage(); renderSubArea(); renderCatList();
}

function delSub(word, e) {
  e.stopPropagation();
  if (typeof activeCat !== 'number') return;
  cats[activeCat].words = cats[activeCat].words.filter(w => w !== word);
  saveStorage(); renderSubArea(); renderCatList();
}

function cntForCat(idx) {
  const res = currentResults();
  if (!res.length) return null;
  const ws = cats[idx]?.words || [];
  return res.filter(r => ws.includes(r._kw)).length;
}

function renderAll() { renderCatList(); renderSubArea(); renderOppCount(); }

function fmtFecha(str) {
  if (!str) return { text: '—', cls: '' };
  const d = new Date(str), now = new Date();
  const h = (d - now) / 3600000;
  const f = d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
  const t = d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
  return { text: `${f} · ${t}`, cls: h < 0 ? '' : h < 24 ? 'urgente' : h < 72 ? 'pronto' : '' };
}

function fmtMonto(m) { return (!m || m === 0) ? '—' : '$' + Number(m).toLocaleString('es-CL'); }

function badgeEstado(e) {
  const map = {
    publicada:              ['badge-pub',  'Publicada'],
    cerrada:                ['badge-cerr', 'Cerrada'],
    desierta:               ['badge-des',  'Desierta'],
    cancelada:              ['badge-canc', 'Cancelada'],
    proveedor_seleccionado: ['badge-sel',  'Adjudicada'],
    oc_emitida:             ['badge-sel',  'OC emitida'],
    revocada:                ['badge-canc', 'Revocada'],
    suspendida:              ['badge-des',  'Suspendida'],
  };
  const [cls, lbl] = map[e] || ['badge-cerr', e || '—'];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function catFor(kw) { const c = cats.find(c => c.words.includes(kw)); return c ? c.name : kw; }

function renderVisible() {
  const el  = document.getElementById('main-area');
  let vis;
  if (activeCat === 'opp') {
    vis = oportunidades;
  } else {
    const base = currentResults();
    if (typeof activeCat === 'number') {
      const ws = cats[activeCat]?.words || [];
      vis = base.filter(r => ws.includes(r._kw));
    } else {
      vis = base;
    }
    // Más reciente primero (por fecha de publicación), tanto en "Todas" como por categoría
    vis = [...vis].sort((a, b) => {
      const da = new Date(a.fechas?.fecha_publicacion || 0).getTime();
      const db = new Date(b.fechas?.fecha_publicacion || 0).getTime();
      return db - da;
    });
  }
  updateScope(); renderCatList(); renderOppCount();
  if (!vis.length) {
    let msg;
    if (activeCat === 'opp') {
      msg = 'Aún no has marcado ninguna oportunidad. Usa la estrella en cada resultado para guardarla aquí.';
    } else if (fuente === 'lic' && !licBuscada) {
      msg = 'Presiona "Buscar licitaciones" para buscar tus categorías en licitaciones públicas.';
    } else {
      msg = 'Sin resultados para esta categoría';
    }
    el.innerHTML = `<div class="empty"><i class="ti ti-search-off"></i>${msg}</div>`;
    return;
  }
  const sortLabel = activeCat === 'opp' ? 'Guardadas' : 'Más reciente primero';
  el.innerHTML =
    `<div class="results-meta">
      <span class="results-count">${vis.length} resultado${vis.length !== 1 ? 's' : ''}</span>
      <span class="sort-lbl"><i class="ti ti-arrow-down" style="font-size:11px"></i> ${sortLabel}</span>
    </div>` +
    vis.map(renderCard).join('');
}

async function buscarTodo() {
  fuente = 'ca';
  document.querySelectorAll('.ftg-btn').forEach(b => b.classList.toggle('active', b.dataset.f === 'ca'));
  const el       = document.getElementById('main-area');
  const estado   = document.getElementById('estado-sel').value;
  const region   = document.getElementById('region-sel').value;
  const allWords = cats.flatMap(c => c.words);

  if (!allWords.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-folder-search"></i>Agrega categorías con palabras clave para comenzar</div>';
    return;
  }

  let done = 0, fetched = [], errors = [];

  el.innerHTML = `<div class="progress-wrap">
    <div>Buscando <strong id="p-kw">…</strong> · palabra <strong id="p-cur">1</strong> de <strong>${allWords.length}</strong></div>
    <div class="prog-track"><div class="prog-fill" id="p-fill" style="width:0%"></div></div>
  </div>`;

  for (const kw of allWords) {
    const pk = document.getElementById('p-kw');
    if (pk) pk.textContent = `"${kw}"`;
    try {
      const qs = new URLSearchParams({ q: kw, estado, tamano: '50' });
      if (region) qs.set('region', region);
      const res  = await fetch(`/api/buscar?${qs.toString()}`);
      const data = await res.json();
      if (data?.payload?.items) {
        data.payload.items.forEach(item => {
          const titulo  = (item.nombre || '').toLowerCase();
          const kwLower = kw.toLowerCase();
          const match   = kwLower.split(' ').every(word => {
            if (word.length <= 2) return new RegExp('\\b' + word + '\\b', 'i').test(titulo);
            return titulo.includes(word);
          });
          if (!fetched.find(r => r.codigo === item.codigo) && match) {
            item._kw = kw;
            fetched.push(item);
          }
        });
      } else if (data?.error) {
        errors.push(`${kw}: ${data.error}`);
      }
    } catch(e) { errors.push(`${kw}: ${e.message}`); }
    done++;
    const pf = document.getElementById('p-fill');
    const pc = document.getElementById('p-cur');
    if (pf) pf.style.width = Math.round((done / allWords.length) * 100) + '%';
    if (pc) pc.textContent = Math.min(done + 1, allWords.length);
  }

  allResults = fetched.sort((a, b) =>
    (b.montos?.monto_disponible_clp || 0) - (a.montos?.monto_disponible_clp || 0)
  );

  activeCat = null;
  renderAll(); updateScope();

  if (errors.length && !allResults.length) {
    el.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" style="font-size:14px"></i>
      Error al consultar la API: ${errors[0]}<br>
      <small>Verifica que tu API key esté activa en <a href="https://api.mercadopublico.cl" target="_blank">api.mercadopublico.cl</a></small>
    </div>`;
    return;
  }

  renderVisible();
}

function estadoLicSlug(codigo) {
  const map = { 5: 'publicada', 6: 'cerrada', 7: 'desierta', 8: 'proveedor_seleccionado', 18: 'revocada', 19: 'suspendida' };
  return map[codigo] || 'cerrada';
}

async function buscarLicitaciones() {
  const el       = document.getElementById('main-area');
  const allWords = cats.flatMap(c => c.words);
  const btn      = document.getElementById('btn-buscar-lic');

  if (!allWords.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-folder-search"></i>Agrega categorías con palabras clave para comenzar</div>';
    return;
  }

  fuente = 'lic';
  document.querySelectorAll('.ftg-btn').forEach(b => b.classList.toggle('active', b.dataset.f === 'lic'));
  activeCat = null;
  if (btn) btn.disabled = true;

  el.innerHTML = `<div class="progress-wrap"><div>Cargando licitaciones activas publicadas hoy...</div></div>`;

  let listado = [];
  try {
    const res  = await fetch('/api/licitaciones-lista');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    listado = data.listado || [];
  } catch (e) {
    el.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" style="font-size:14px"></i>
      Error al consultar licitaciones: ${e.message}</div>`;
    if (btn) btn.disabled = false;
    return;
  }

  // Mismo criterio de coincidencia que Compra Ágil, aplicado localmente sobre el listado
  const matches = [];
  allWords.forEach(kw => {
    const kwLower = kw.toLowerCase();
    listado.forEach(item => {
      const titulo = (item.Nombre || '').toLowerCase();
      const match  = kwLower.split(' ').every(word => {
        if (word.length <= 2) return new RegExp('\\b' + word + '\\b', 'i').test(titulo);
        return titulo.includes(word);
      });
      if (match && !matches.find(m => m.CodigoExterno === item.CodigoExterno)) {
        matches.push({ ...item, _kw: kw });
      }
    });
  });

  if (!matches.length) {
    allResultsLic = [];
    licBuscada = true;
    renderAll(); updateScope(); renderVisible();
    if (btn) btn.disabled = false;
    return;
  }

  // Trae el detalle (organismo, monto, fechas) solo de las coincidencias encontradas
  const detallados = [];
  let done = 0;
  for (const m of matches) {
    el.innerHTML = `<div class="progress-wrap">
      <div>Obteniendo detalle <strong>${done + 1}</strong> de <strong>${matches.length}</strong> licitaciones encontradas</div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((done / matches.length) * 100)}%"></div></div>
    </div>`;
    try {
      const res  = await fetch(`/api/licitaciones-detalle?codigo=${encodeURIComponent(m.CodigoExterno)}`);
      const data = await res.json();
      const d    = data.item;
      detallados.push({
        codigo: m.CodigoExterno,
        nombre: d?.Nombre || m.Nombre,
        institucion: { organismo_comprador: d?.Comprador?.NombreOrganismo || '—' },
        montos: { monto_disponible_clp: d?.MontoEstimado || 0 },
        fechas: { fecha_cierre: d?.Fechas?.FechaCierre || null, fecha_publicacion: d?.Fechas?.FechaPublicacion || null },
        estado: { codigo: estadoLicSlug(d?.CodigoEstado ?? m.CodigoEstado) },
        _kw: m._kw,
        _tipo: 'lic',
      });
    } catch (e) {
      detallados.push({
        codigo: m.CodigoExterno,
        nombre: m.Nombre,
        institucion: { organismo_comprador: '—' },
        montos: { monto_disponible_clp: 0 },
        fechas: { fecha_cierre: null, fecha_publicacion: null },
        estado: { codigo: estadoLicSlug(m.CodigoEstado) },
        _kw: m._kw,
        _tipo: 'lic',
      });
    }
    done++;
  }

  allResultsLic = detallados.sort((a, b) =>
    (b.montos.monto_disponible_clp || 0) - (a.montos.monto_disponible_clp || 0)
  );
  licBuscada = true;
  renderAll(); updateScope(); renderVisible();
  if (btn) btn.disabled = false;
}

// --- Cotización AMK (Excel a partir de la plantilla de Andes Medikeep) ---

function generarCotizacion(codigo, tipo, e, formato) {
  if (e) e.stopPropagation();
  let url = `/api/cotizacion?codigo=${encodeURIComponent(codigo)}&tipo=${encodeURIComponent(tipo || 'ca')}`;
  if (formato) url += `&formato=${encodeURIComponent(formato)}`;
  const a = document.createElement('a');
  a.href = url;
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// --- Precios de referencia (histórico de Órdenes de Compra, on-demand) ---

function tipoOcLabel(t) {
  const map = { AG: 'Compra Ágil', LE: 'Licitación', LP: 'Licitación', LQ: 'Licitación', LR: 'Licitación', LS: 'Licitación', L1: 'Licitación', CM: 'Convenio Marco', E2: 'Trato Directo', TD: 'Trato Directo' };
  return map[t] || (t || '—');
}

async function pLimitAll(items, limit, worker) {
  let i = 0;
  const results = [];
  async function next() {
    while (i < items.length) {
      const idx = i++;
      results[idx] = await worker(items[idx], idx);
    }
  }
  await Promise.all(Array(Math.min(limit, items.length)).fill(0).map(next));
  return results;
}

function generarExcelPrecios(nombreCat, filas) {
  const data = [
    ['Producto', 'Precio unitario neto (CLP)', 'Cantidad', 'Comprador', 'Vendedor', 'Fecha', 'Tipo', 'Código OC'],
    ...filas.map(f => [f.producto, f.precio, f.cantidad, f.comprador, f.vendedor, f.fecha, f.tipo, f.codigo]),
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 55 }, { wch: 20 }, { wch: 10 }, { wch: 38 }, { wch: 32 }, { wch: 12 }, { wch: 16 }, { wch: 20 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Precios');
  const fname = `Precios_${nombreCat.replace(/[^a-zA-Z0-9]+/g, '_')}_${new Date().toISOString().slice(0, 10)}.xlsx`;
  XLSX.writeFile(wb, fname);
}

async function descargarPrecios(idx) {
  if (typeof idx !== 'number' || !cats[idx]) return;
  const cat      = cats[idx];
  const allWords = cat.words;
  const btn      = document.getElementById('btn-precios');
  const el       = document.getElementById('main-area');

  if (!allWords.length) {
    alert('Esta categoría no tiene palabras clave todavía.');
    return;
  }

  if (btn) btn.disabled = true;

  const DIAS = 270; // ≈ 9 meses
  const hoy = new Date();
  const fechas = [];
  for (let i = 0; i < DIAS; i++) {
    const d = new Date(hoy);
    d.setDate(d.getDate() - i);
    fechas.push(`${String(d.getDate()).padStart(2, '0')}${String(d.getMonth() + 1).padStart(2, '0')}${d.getFullYear()}`);
  }

  const palabras = encodeURIComponent(allWords.join('|'));
  const matches = [];
  let doneDias = 0;

  function renderProgresoDias() {
    el.innerHTML = `<div class="progress-wrap">
      <div>Revisando compras de <strong>${cat.name}</strong> · día <strong>${doneDias}</strong> de <strong>${DIAS}</strong> (≈9 meses)</div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((doneDias / DIAS) * 100)}%"></div></div>
      <div style="margin-top:6px;font-size:11px">${matches.length} coincidencias encontradas hasta ahora</div>
    </div>`;
  }
  renderProgresoDias();

  await pLimitAll(fechas, 8, async (fecha) => {
    try {
      const res  = await fetch(`/api/oc-lista?fecha=${fecha}&palabras=${palabras}`);
      const data = await res.json();
      if (data.matches) {
        data.matches.forEach(m => {
          if (!matches.find(x => x.Codigo === m.Codigo)) matches.push(m);
        });
      }
    } catch (e) { /* se ignora el día con error y se sigue */ }
    doneDias++;
    if (doneDias % 4 === 0 || doneDias === DIAS) renderProgresoDias();
  });

  if (!matches.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-file-off"></i>No se encontraron compras en los últimos 9 meses para "${cat.name}"</div>`;
    if (btn) btn.disabled = false;
    setTimeout(renderVisible, 2500);
    return;
  }

  const filas = [];
  let doneDet = 0;

  function renderProgresoDetalle() {
    el.innerHTML = `<div class="progress-wrap">
      <div>Obteniendo precios <strong>${doneDet}</strong> de <strong>${matches.length}</strong> coincidencias</div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((doneDet / matches.length) * 100)}%"></div></div>
    </div>`;
  }
  renderProgresoDetalle();

  await pLimitAll(matches, 6, async (m) => {
    try {
      const res  = await fetch(`/api/oc-detalle?codigo=${encodeURIComponent(m.Codigo)}`);
      const data = await res.json();
      const d    = data.item;
      if (d?.Items?.Listado?.length) {
        d.Items.Listado.forEach(it => {
          filas.push({
            producto: it.EspecificacionProveedor || it.EspecificacionComprador || it.Producto || d.Nombre,
            precio: it.PrecioNeto || 0,
            cantidad: it.Cantidad || 0,
            comprador: d.Comprador?.NombreOrganismo || '—',
            vendedor: d.Proveedor?.Nombre || '—',
            fecha: (d.Fechas?.FechaAceptacion || d.Fechas?.FechaCreacion || '').slice(0, 10),
            tipo: tipoOcLabel(d.Tipo),
            codigo: d.Codigo,
          });
        });
      }
    } catch (e) { /* se ignora la OC con error y se sigue */ }
    doneDet++;
    if (doneDet % 3 === 0 || doneDet === matches.length) renderProgresoDetalle();
  });

  if (!filas.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-file-off"></i>Se encontraron coincidencias pero no fue posible obtener el detalle de precios</div>`;
    if (btn) btn.disabled = false;
    setTimeout(renderVisible, 2500);
    return;
  }

  filas.sort((a, b) => a.precio - b.precio);
  generarExcelPrecios(cat.name, filas);

  if (btn) btn.disabled = false;
  renderVisible();
}

loadStorage().then(() => {
  renderAll();
  updateScope();
  buscarTodo();
});
</script>
</body>
</html>
